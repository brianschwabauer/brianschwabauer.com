<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link
			rel="icon"
			href="%sveltekit.assets%/brandmark.svg"
			type="image/svg+xml"
		/>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,200..1000;1,200..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap"
			rel="stylesheet"
		/>
		<script>
			// Pre-paint theme bootstrap — mirrors logic in src/routes/+layout.svelte
			// to prevent the light/dark flash on reload.
			(function () {
				try {
					var path = location.pathname;
					var theme;
					if (path === "/") {
						theme = "dark";
					} else if (path === "/admin" || path.indexOf("/admin/") === 0) {
						var stored = localStorage.getItem("theme");
						if (stored === "light" || stored === "dark") {
							theme = stored;
						} else {
							theme =
								window.matchMedia &&
								window.matchMedia("(prefers-color-scheme: dark)").matches
									? "dark"
									: "light";
						}
					} else {
						theme = "light";
					}
					document.documentElement.dataset.theme = theme;
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
